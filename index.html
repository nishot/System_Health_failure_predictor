<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Failure Predictor</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 35px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(34,197,94,0.4);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #334155;
            border-radius: 8px;
            text-align: center;
            line-height: 1.6;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>⚙️ System Failure Predictor</h2>

    <label>Type (0=L, 1=M, 2=H)</label>
    <input type="number" id="type" placeholder="e.g. 0 (Low quality machine)">

    <label>Air Temperature (K)</label>
    <input type="number" id="air_temp" placeholder="e.g. 298.3" step="any">

    <label>Process Temperature (K)</label>
    <input type="number" id="process_temp" placeholder="e.g. 308.5" step="any">

    <label>Rotational Speed (rpm)</label>
    <input type="number" id="speed" placeholder="e.g. 1500">

    <label>Torque (Nm)</label>
    <input type="number" id="torque" placeholder="e.g. 40.5" step="any">

    <label>Tool Wear (min)</label>
    <input type="number" id="wear" placeholder="e.g. 80">

    <button onclick="predict()">🚀 Predict</button>

    <div class="result" id="result">
        Result will appear here
    </div>
</div>

<script>
async function predict() {
    const type = document.getElementById("type").value;
    const airTemp = document.getElementById("air_temp").value;
    const processTemp = document.getElementById("process_temp").value;
    const speed = document.getElementById("speed").value;
    const torque = document.getElementById("torque").value;
    const wear = document.getElementById("wear").value;

    const resultBox = document.getElementById("result");

    if (!type || !airTemp || !processTemp || !speed || !torque || !wear) {
        alert("Please fill all fields");
        return;
    }

    const data = {
        Type: Number(type),
        Air_temp: Number(airTemp),
        Process_temp: Number(processTemp),
        Rotational_speed: Number(speed),
        Torque: Number(torque),
        Tool_wear: Number(wear)
    };

    try {
        resultBox.innerHTML = "⏳ Predicting...";

        const response = await fetch("https://system-health-failure-predictor.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        resultBox.innerHTML = `
            <strong>Failure Probability:</strong> ${result.failure_probability}<br>
            <strong>Risk Level:</strong> ${result.risk_level}
        `;

    } catch (error) {
        resultBox.innerText = "❌ Error connecting to API";
    }
}
</script>

</body>
</html>
